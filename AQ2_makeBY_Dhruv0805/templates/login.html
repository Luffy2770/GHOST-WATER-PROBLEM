<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaWatch • Login</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d1b2e; --bg2: #0f2040; --bg3: #122348;
            --border: #1e3a5f; --text: #e8f0fa; --text2: #93b4d8; --text3: #5580a8;
            --pink: #e8265a; --cyan: #38b4f0; --safe: #4ecb7a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.4);
        }
        .logo {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 36px;
        }
        .logo-icon {
            width: 44px; height: 44px;
            background: var(--pink); border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px;
        }
        .logo-name { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
        .logo-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); letter-spacing: 1px; }
        h2 { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
        .sub { color: var(--text3); font-size: 14px; margin-bottom: 32px; }
        .field { margin-bottom: 16px; }
        label { display: block; font-size: 12px; color: var(--text2); margin-bottom: 8px; font-weight: 500; letter-spacing: 0.5px; }
        input {
            width: 100%; padding: 12px 16px;
            background: var(--bg3); border: 1px solid var(--border);
            border-radius: 12px; color: var(--text);
            font-size: 14px; font-family: inherit; outline: none;
            transition: border-color 0.15s;
        }
        input:focus { border-color: var(--cyan); }
        input::placeholder { color: var(--text3); }
        .btn {
            width: 100%; padding: 14px;
            background: var(--pink); color: #fff;
            border: none; border-radius: 12px;
            font-size: 15px; font-weight: 600;
            cursor: pointer; margin-top: 8px;
            font-family: inherit;
            transition: background 0.15s;
        }
        .btn:hover { background: #d41e4f; }
        .error {
            background: rgba(255,82,82,0.1);
            border: 1px solid rgba(255,82,82,0.3);
            color: #ff8080; border-radius: 10px;
            padding: 12px 16px; font-size: 13px;
            margin-bottom: 20px;
        }
        .footer-link {
            text-align: center; margin-top: 24px;
            font-size: 13px; color: var(--text3);
        }
        .footer-link a { color: var(--cyan); text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
        .divider { height: 1px; background: var(--border); margin: 28px 0; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon">💧</div>
        <div>
            <div class="logo-name">AquaWatch</div>
            <div class="logo-sub">AHMEDABAD • NRW MONITOR</div>
        </div>
    </div>

    <h2>Welcome back</h2>
    <p class="sub">Sign in to access the dashboard</p>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST" action="/login">
        <div class="field">
            <label>USERNAME</label>
            <input type="text" name="username" placeholder="Enter your username" required autofocus>
        </div>
        <div class="field">
            <label>PASSWORD</label>
            <input type="password" name="password" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn">Sign In →</button>
    </form>

    <div class="divider"></div>
    <div class="footer-link">
        Don't have an account? <a href="/signup">Create one here</a>
    </div>
</div>
</body>
</html>
